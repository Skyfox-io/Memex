name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  wikilinks:
    name: Wikilink integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify nonprofit example wikilinks
        run: python3 memex/scripts/verify-wikilinks.py examples/nonprofit

      - name: Verify startup example wikilinks
        run: python3 memex/scripts/verify-wikilinks.py examples/startup

      - name: Verify nonprofit example typed-edge graph
        run: python3 memex/scripts/extract-graph.py examples/nonprofit --check

      - name: Verify startup example typed-edge graph
        run: python3 memex/scripts/extract-graph.py examples/startup --check

  placeholders:
    name: No placeholder text in examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for placeholders
        run: |
          if grep -r '\[placeholder\]\|\[bracket\]\|{{.*}}' --include="*.md" examples/; then
            echo "ERROR: Placeholder text found in examples/"
            exit 1
          fi
          echo "CLEAN - no placeholder text"
