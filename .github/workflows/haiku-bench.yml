name: Haiku LongMemEval-Oracle benchmark

# Manual-trigger only. Costs ~$2-4 per run via the ANTHROPIC_API_KEY secret.
# Generates Haiku-written closets summaries for the LongMemEval-Oracle subset
# and runs the haiku:bm25 + haiku:embed strategies. Uploads the cache and
# results as artifacts so you can review or commit them locally.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap unique sessions (blank = all ~1,000 unique on Oracle, ~$3)"
        required: false
        type: string
      workers:
        description: "Concurrent API calls (default 8)"
        required: false
        type: string
        default: "8"

permissions:
  contents: read

jobs:
  haiku-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Three-layer guard:
    # 1. workflow_dispatch only (verified in first step) — strangers can't trigger.
    # 2. Repo check — never run on forks.
    # 3. environment: paid-eval — store the secret on a GitHub Environment that
    #    requires explicit reviewer approval before each run, OR scope to a
    #    maintainer-only branch protection rule.
    environment: paid-eval
    if: github.repository == 'Skyfox-io/Memex'

    steps:
      - name: Verify trigger context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "ERROR: only workflow_dispatch is allowed for this job."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install --quiet uv

      - name: Set up venv and deps
        working-directory: benchmarks/longmemeval
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python --quiet \
            datasets rank_bm25 numpy tqdm huggingface_hub \
            sentence-transformers anthropic

      - name: Download LongMemEval-Oracle dataset
        working-directory: benchmarks/longmemeval
        run: .venv/bin/python download.py

      - name: Generate Haiku closets summaries (Oracle)
        working-directory: benchmarks/longmemeval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${{ inputs.limit }}" ]; then
            .venv/bin/python prepare_haiku.py --dataset oracle --workers ${{ inputs.workers }}
          else
            .venv/bin/python prepare_haiku.py --dataset oracle --workers ${{ inputs.workers }} --limit ${{ inputs.limit }}
          fi

      - name: Run haiku strategies on Oracle
        working-directory: benchmarks/longmemeval
        run: |
          .venv/bin/python run_bench.py \
            --dataset oracle \
            --strategies haiku:bm25 haiku:embed summary:bm25 summary:embed \
            --save-as oracle-haiku

      - name: Compare haiku:embed vs summary:embed
        working-directory: benchmarks/longmemeval
        run: |
          .venv/bin/python compare.py \
            results/haiku_embed_oracle-haiku.json \
            results/summary_embed_oracle-haiku.json \
            --by-type | tee results/haiku-vs-heuristic.txt

      - name: Workflow summary
        working-directory: benchmarks/longmemeval
        run: |
          {
            echo "# Haiku-Oracle benchmark results"
            echo ""
            echo "Cache: \`benchmarks/longmemeval/cache/haiku_summaries.json\` (uploaded as artifact)"
            echo ""
            echo "## Headline (Oracle, 500 questions, 3 sessions each)"
            echo ""
            echo "| Strategy | R@5 | R@10 | MRR | Hit@5 |"
            echo "|---|---|---|---|---|"
            for f in results/*_oracle-haiku.json; do
              .venv/bin/python print_summary_row.py "$f"
            done
            echo ""
            echo "## Haiku vs heuristic (paired bootstrap)"
            echo ""
            echo '```'
            cat results/haiku-vs-heuristic.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cache + results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: haiku-bench-${{ github.run_id }}
          path: |
            benchmarks/longmemeval/cache/haiku_summaries.json
            benchmarks/longmemeval/cache/haiku_summaries.failed.json
            benchmarks/longmemeval/results/*_oracle-haiku.json
            benchmarks/longmemeval/results/haiku-vs-heuristic.txt
          retention-days: 30
          if-no-files-found: warn
